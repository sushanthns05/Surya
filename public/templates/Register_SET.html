{% extends 'SEOAS_Base.html' %}

{% block exam_title %}Surya Entrance Test (SET) - Registration{% endblock %}
{% block exam_heading %}SURYA ENTRANCE TEST (SET){% endblock %}

{% block exam_selection %}
<div class="form-group">
  <label>Selected Examination</label>
  <input type="text" id="exam-select" value="SET" readonly style="background: rgba(59, 130, 246, 0.1); font-weight: bold; color: var(--seoas-blue);">
</div>
{% endblock %}

{% block academic_details %}
<div class="form-group"><label>Class X Board</label><input type="text" required></div>
<div class="form-group"><label>Class X Passing Year</label><input type="number" required></div>
<div class="form-group"><label>Class X Marks (%)</label><input type="text" required></div>
{% endblock %}
