{% extends 'SEOAS_Base.html' %}

{% block exam_title %}Surya Scholarship Test (SST) - Registration{% endblock %}
{% block exam_heading %}SURYA SCHOLARSHIP TEST (SST){% endblock %}

{% block exam_selection %}
<div class="form-group">
  <label>Selected Examination</label>
  <input type="text" id="exam-select" value="SST" readonly style="background: rgba(59, 130, 246, 0.1); font-weight: bold; color: var(--seoas-blue);">
</div>
{% endblock %}

{% block academic_details %}
<div class="form-group"><label>Current Class/Degree</label><select><option>Class IX</option><option>Class X</option><option>PUC</option><option>B.Tech</option></select></div>
<div class="form-group"><label>Previous Year Marks (%)</label><input type="text" required></div>
{% endblock %}
