{% extends 'SEOAS_Base.html' %}

{% block exam_title %}Surya Aptitude Test (SAT) - Registration{% endblock %}
{% block exam_heading %}SURYA APTITUDE TEST (SAT){% endblock %}

{% block exam_selection %}
<div class="form-group">
  <label>Selected Examination</label>
  <input type="text" id="exam-select" value="SAT" readonly style="background: rgba(59, 130, 246, 0.1); font-weight: bold; color: var(--seoas-blue);">
</div>
{% endblock %}

{% block academic_details %}
<div class="form-group"><label>Class XII Board</label><input type="text" required></div>
<div class="form-group"><label>Class XII Stream</label><select><option>Science</option><option>Commerce</option><option>Arts</option></select></div>
<div class="form-group"><label>Class XII Marks (%)</label><input type="text" required></div>
{% endblock %}
