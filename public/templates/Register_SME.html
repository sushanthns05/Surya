{% extends 'SEOAS_Base.html' %}

{% block exam_title %}Surya Medical Entrance (SME) - Registration{% endblock %}
{% block exam_heading %}SURYA MEDICAL ENTRANCE (SME){% endblock %}

{% block exam_selection %}
<div class="form-group">
  <label>Selected Examination</label>
  <input type="text" id="exam-select" value="SME" readonly style="background: rgba(59, 130, 246, 0.1); font-weight: bold; color: var(--seoas-blue);">
</div>
{% endblock %}

{% block academic_details %}
<div class="form-group"><label>NEET Roll Number</label><input type="text" required></div>
<div class="form-group"><label>NEET Score</label><input type="number" required></div>
<div class="form-group"><label>PCB Percentage</label><input type="text" required></div>
{% endblock %}
