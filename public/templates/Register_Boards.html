{% extends 'SEOAS_Base.html' %}

{% block exam_title %}Surya Board Exams - Registration{% endblock %}
{% block exam_heading %}BOARD EXAMINATIONS REGISTRATION{% endblock %}

{% block exam_selection %}
<div class="form-group">
  <label>Selected Examination</label>
  <input type="text" id="exam-select" value="BOARDS" readonly style="background: rgba(59, 130, 246, 0.1); font-weight: bold; color: var(--seoas-blue);">
</div>
{% endblock %}

{% block academic_details %}
<div class="form-group"><label>School Code</label><input type="text" required></div>
<div class="form-group"><label>Previous Class Marks</label><input type="text" required></div>
{% endblock %}
